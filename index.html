<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hiatus Hernia CT | Premium Experience</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- ICON -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
overflow-x:hidden;
background:black;
}

/* PROGRESS */
#progress{
position:fixed;
top:0;
left:0;
height:4px;
background:linear-gradient(90deg,#00f0ff,#00ffa6);
width:0%;
z-index:999;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1530497610245-94d3c16cda28?q=80&w=1920') center/cover no-repeat;
z-index:-3;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-2;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* SECTION */
.section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
text-align:center;
}

/* TEXT */
.title{
font-size:clamp(50px,8vw,100px);
font-weight:700;
background:linear-gradient(90deg,#00f0ff,#00ffa6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
opacity:0.7;
margin-top:10px;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:25px;
backdrop-filter:blur(15px);
box-shadow:0 0 30px rgba(0,255,200,0.2);
transition:0.3s;
}

.glass:hover{
transform:scale(1.03);
box-shadow:0 0 60px rgba(0,255,200,0.5);
}

/* BUTTON */
.btn{
padding:10px 20px;
margin:5px;
border-radius:999px;
background:linear-gradient(90deg,#00f0ff,#00ffa6);
color:black;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* IMAGE */
#ct{
width:300px;
border-radius:20px;
cursor:grab;
transition:0.2s;
}

</style>
</head>

<body>

<div id="progress"></div>
<div class="bg"></div>
<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- HERO -->
<section class="section">
<div>
<h1 class="title">HIATUS HERNIA CT</h1>
<p class="subtitle">Radiology Intelligence Experience</p>
<p class="subtitle">Are you sure it's only GERD?</p>
</div>
</section>

<!-- CASE -->
<section class="section">
<div class="glass max-w-xl">
<p>
👩‍⚕️ Female, 49 y/o<br><br>
Epigastric pain + vomiting<br><br>
<b>👉 What type of hiatus hernia?</b>
</p>
</div>
</section>

<!-- AI -->
<section class="section">
<div class="glass">
<h2 class="mb-3">🧠 AI Clinical Decision</h2>

<select id="symptom" class="p-2 text-black rounded">
<option value="">Select</option>
<option value="mild">Pain only</option>
<option value="moderate">Pain + nausea</option>
<option value="severe">Pain + vomiting</option>
</select>

<button class="btn" onclick="analyze()">Analyze</button>

<p id="aiResult" class="mt-3"></p>
</div>
</section>

<!-- QUIZ -->
<section class="section">
<div class="glass">
<h2>🎯 Challenge</h2>

<button class="btn" onclick="quiz(false)">Type 2</button>
<button class="btn" onclick="quiz(true)">Type 1</button>
<button class="btn" onclick="quiz(false)">Type 3</button>

<p id="quizText"></p>
</div>
</section>

<!-- CT VIEWER -->
<section class="section">
<div class="glass">
<h2>🩻 Interactive CT</h2>

<img id="ct" src="https://upload.wikimedia.org/wikipedia/commons/8/8a/CT_scan.jpg">

<br><br>

<input type="range" min="1" max="3" step="0.1" value="1" oninput="zoom(this.value)">
</div>
</section>

<!-- REACT -->
<section class="section">
<div class="glass">
<h2>🔥 Reaction</h2>

<button class="btn" onclick="react('🔥')">🔥</button>
<button class="btn" onclick="react('😮')">😮</button>
<button class="btn" onclick="react('👍')">👍</button>

<p id="react"></p>
</div>
</section>

<!-- VIDEO -->
<section class="section">
<iframe width="800" height="450"
src="https://www.youtube.com/embed/j8CT7K_7rX0"
class="rounded-xl shadow-2xl"></iframe>
</section>

<!-- END -->
<section class="section">
<h1 class="title">THANK YOU</h1>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ANIM */
gsap.utils.toArray(".glass").forEach(el=>{
gsap.from(el,{
scrollTrigger:{ trigger:el, start:"top 80%" },
opacity:0,
y:100,
duration:1
});
});

/* PROGRESS */
window.onscroll=()=>{
let winScroll=document.documentElement.scrollTop;
let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
document.getElementById("progress").style.width=(winScroll/height)*100+"%";
};

/* AI */
function analyze(){
let val=document.getElementById("symptom").value;
let txt="";

if(val=="mild") txt="Likely GERD";
if(val=="moderate") txt="Possible Hiatus Hernia";
if(val=="severe") txt="⚠️ Strong suspicion Type 1 Sliding Hernia";

document.getElementById("aiResult").innerText=txt;
}

/* QUIZ */
function quiz(correct){
document.getElementById("quizText").innerText=
correct ? "✅ Correct (Type 1 = 95%)" : "❌ Try again";
}

/* ZOOM */
function zoom(v){
document.getElementById("ct").style.transform="scale("+v+")";
}

/* REACT */
function react(e){
document.getElementById("react").innerText="You reacted: "+e;
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="cyan";
ctx.fill();
p.y+=0.3;
if(p.y>canvas.height) p.y=0;
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
